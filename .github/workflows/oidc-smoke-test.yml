name: OIDC Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - An_CDO-W12-002-github-oidc

permissions:
  id-token: write
  contents: read

jobs:
  assume-role-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug OIDC claims
        run: |
          TOKEN_JSON=$(curl -sLS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}")
          TOKEN=$(echo "$TOKEN_JSON" | python -c "import sys,json; print(json.load(sys.stdin)['value'])")
          echo "$TOKEN" | cut -d "." -f2 | python -c "import sys,base64,json; s=sys.stdin.read().strip(); s += '=' * (-len(s) % 4); print(json.dumps(json.loads(base64.urlsafe_b64decode(s)), indent=2))"

      - name: Configure AWS credentials by OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::511825856493:role/tf4-cdo04-github-deploy-role
          role-session-name: github-actions-tf4-cdo04

      - name: Verify caller identity
        run: |
          aws sts get-caller-identity