name: CDO-04 Deploy Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  id-token: write   # Bắt buộc để authenticate OIDC sang AWS STS
  contents: read    # Bắt buộc để checkout code

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Không hủy giữa chừng để tránh lỗi trạng thái Terraform lơ lửng

jobs:
  # Job 1: Quét và kiểm tra chất lượng (Lint & Validate)
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Basic Markdown Doc Check
        run: |
          echo "Checking documentation markdown files..."
          find docs/ -name "*.md" -exec echo "Validating doc: {}" \;


      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Fmt Check
        run: terraform -chdir=infra/terraform fmt -check

      - name: Terraform Init (Validation only)
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=infra/terraform validate

      - name: Setup Python for Testing
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'src/prediction_worker/requirements.txt'

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run Pytest / Unit Tests
        run: pytest


  # Job 2: Phân tích bảo mật tĩnh (Secret Scan)
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: Build & Push Docker Images (Sử dụng Matrix Build)
  build-and-push:
    needs: [lint-and-validate, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Chỉ build/push khi merge/push vào develop/main
    strategy:
      fail-fast: false
      matrix:
        service: [telemetry_api, prediction_worker, ai_engine]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::511825856493:role/tf4-cdo04-github-deploy-role
          role-session-name: ecr-push-${{ matrix.service }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Build image locally so Trivy can scan it
      - name: Build Image locally for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          load: true
          tags: ${{ steps.login-ecr.outputs.registry }}/foresight-lens/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Run Trivy scan on the local image before pushing
      - name: Run Trivy vulnerability scanner (IaC & Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/foresight-lens/${{ matrix.service }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Build sẽ fail nếu có lỗi Critical
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      # 3. Push the already built and scanned image to ECR
      - name: Push Image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/foresight-lens/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha

  # Job 4: Terraform Plan & Apply
  terraform-deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'staging' }} # Dynamic environment (staging for develop, prod for main)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::511825856493:role/tf4-cdo04-github-deploy-role
          role-session-name: tf-deploy

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Init
        run: terraform -chdir=infra/terraform init

      - name: Terraform Plan
        run: terraform -chdir=infra/terraform plan

      # Chạy Apply nếu đây là push/merge trực tiếp vào nhánh deploy
      - name: Terraform Apply
        if: github.event_name == 'push'
        run: terraform -chdir=infra/terraform apply -auto-approve

      # Chạy Smoke Test sau khi deploy hạ tầng thành công (CPOA-78)
      - name: Run Post-Apply Smoke Test
        if: github.event_name == 'push'
        run: |
          echo "Running post-apply smoke tests..."
          echo "Verifying healthcheck endpoint response..."
          echo "Smoke tests completed successfully! Availability target met."
