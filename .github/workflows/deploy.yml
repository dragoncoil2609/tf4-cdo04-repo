name: CDO-04 Deploy Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  id-token: write   # OIDC -> AWS STS
  contents: read    # checkout

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Basic Markdown Doc Check
        run: |
          echo "Checking documentation markdown files..."
          find docs/ -name "*.md" -exec echo "Validating doc: {}" \;

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Fmt Check
        run: terraform -chdir=infra/terraform fmt -check

      - name: Terraform Init (Validation only)
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=infra/terraform validate

      - name: Setup Python for Testing
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Service Dependencies + Pytest
        run: |
          python -m pip install --upgrade pip
          pip install -r src/ai_engine/requirements.txt
          pip install -r src/telemetry_api/requirements.txt
          pip install -r src/prediction_worker/requirements.txt
          pip install pytest

      - name: Run Pytest / Unit Tests
        env:
          PYTHONPATH: src:src/ai_engine
        run: pytest

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform-plan-pr:
    needs: [lint-and-validate, security-scan]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::511825856493:role/tf4-cdo04-github-deploy-role
          role-session-name: tf-plan-pr

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Init
        run: terraform -chdir=infra/terraform init -backend-config="key=tf4-cdo04/sandbox/terraform.tfstate"

      - name: Terraform Plan (PR review artifact)
        run: |
          terraform -chdir=infra/terraform plan -no-color \
            -var="environment=sandbox" \
            | tee infra/terraform/tfplan-pr.txt

      - name: Upload PR Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-pr-${{ github.event.pull_request.number }}
          path: infra/terraform/tfplan-pr.txt

  build-and-push:
    needs: [lint-and-validate, security-scan]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [telemetry_api, prediction_worker, ai_engine]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::511825856493:role/tf4-cdo04-github-deploy-role
          role-session-name: ecr-push-${{ matrix.service }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image locally for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          load: true
          tags: ${{ steps.login-ecr.outputs.registry }}/foresight-lens/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/foresight-lens/${{ matrix.service }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Push Image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/foresight-lens/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha

  terraform-plan:
    needs: [build-and-push]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.set-env.outputs.env }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=staging" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::511825856493:role/tf4-cdo04-github-deploy-role
          role-session-name: tf-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Init
        run: terraform -chdir=infra/terraform init -backend-config="key=tf4-cdo04/${{ steps.set-env.outputs.env }}/terraform.tfstate"

      - name: Terraform Plan
        run: |
          terraform -chdir=infra/terraform plan -out=tfplan \
            -var="environment=${{ steps.set-env.outputs.env }}" \
            -var="telemetry_api_image_tag=511825856493.dkr.ecr.us-east-1.amazonaws.com/foresight-lens/telemetry_api:${{ github.sha }}" \
            -var="prediction_worker_image_tag=511825856493.dkr.ecr.us-east-1.amazonaws.com/foresight-lens/prediction_worker:${{ github.sha }}" \
            -var="ai_engine_image_tag=511825856493.dkr.ecr.us-east-1.amazonaws.com/foresight-lens/ai_engine:${{ github.sha }}"

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ steps.set-env.outputs.env }}
          path: infra/terraform/tfplan

  terraform-apply:
    needs: [terraform-plan]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: ${{ needs.terraform-plan.outputs.env }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=staging" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::511825856493:role/tf4-cdo04-github-deploy-role
          role-session-name: tf-apply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ steps.set-env.outputs.env }}
          path: infra/terraform

      - name: Terraform Init
        run: terraform -chdir=infra/terraform init -backend-config="key=tf4-cdo04/${{ steps.set-env.outputs.env }}/terraform.tfstate"

      - name: Terraform Apply
        run: terraform -chdir=infra/terraform apply tfplan

      - name: Post-Apply Smoke Test (scaffold)
        run: |
          echo "Post-apply smoke test scaffold — not yet wired to real endpoints."
          echo "Pending: healthcheck URL from terraform outputs."
          echo "Smoke scaffold complete (no real E2E assertion made)."
