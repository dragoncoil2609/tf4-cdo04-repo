name: CDO-04 Deploy Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  id-token: write   # Bắt buộc để authenticate OIDC sang AWS STS
  contents: read    # Bắt buộc để checkout code
  actions: write    # Bắt buộc để upload Terraform plan artifact lên PR

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Không hủy giữa chừng để tránh lỗi trạng thái Terraform lơ lửng

jobs:
  # Job 1: Quét và kiểm tra chất lượng (Lint & Validate)
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Basic Markdown Doc Check
        run: |
          echo "Checking documentation markdown files..."
          find docs/ -name "*.md" -exec echo "Validating doc: {}" \;


      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Fmt Check
        run: terraform -chdir=infra/terraform fmt -check

      - name: Terraform Init (Validation only)
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=infra/terraform validate

      - name: Setup Python for Testing
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: |
            src/ai_engine/requirements.txt
            src/prediction_worker/requirements.txt
            src/telemetry_api/requirements.txt

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/ai_engine/requirements.txt -r src/prediction_worker/requirements.txt -r src/telemetry_api/requirements.txt

      - name: Run Pytest / Unit Tests
        env:
          PYTHONPATH: src/ai_engine:src
        run: pytest


  # Job 2: Phân tích bảo mật tĩnh (Secret Scan)
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2.5: Terraform Plan (chỉ chạy trên PR — để reviewer đọc plan trước khi merge)
  terraform-plan:
    needs: [lint-and-validate, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::511825856493:role/tf4-cdo04-github-deploy-role
          role-session-name: tf-plan-pr-${{ github.event.pull_request.number }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Init
        run: |
          case "${{ github.base_ref }}" in
            main) state_key="tf4-cdo04/prod/terraform.tfstate" ;;
            develop) state_key="tf4-cdo04/sandbox/terraform.tfstate" ;;
            *) state_key="tf4-cdo04/sandbox/terraform.tfstate" ;;
          esac
          terraform -chdir=infra/terraform init -backend-config="key=${state_key}"

      - name: Terraform Plan
        run: |
          terraform -chdir=infra/terraform plan -out=tfplan \
            -var="telemetry_api_image_tag=511825856493.dkr.ecr.us-east-1.amazonaws.com/foresight-lens/telemetry_api:${{ github.sha }}" \
            -var="prediction_worker_image_tag=511825856493.dkr.ecr.us-east-1.amazonaws.com/foresight-lens/prediction_worker:${{ github.sha }}" \
            -var="ai_engine_image_tag=511825856493.dkr.ecr.us-east-1.amazonaws.com/foresight-lens/ai_engine:${{ github.sha }}"

      - name: Save Plan Output (human-readable)
        run: |
          terraform -chdir=infra/terraform show -no-color tfplan > plan-output.txt
          echo "--- Terraform Plan Summary ---" >> plan-output.txt
          echo "PR: #${{ github.event.pull_request.number }}" >> plan-output.txt
          echo "Commit: ${{ github.sha }}" >> plan-output.txt
          echo "Branch: ${{ github.head_ref }}" >> plan-output.txt

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-pr-${{ github.event.pull_request.number }}
          path: plan-output.txt
          retention-days: 14

  # Job 3: Build & Push Docker Images (Sử dụng Matrix Build)
  build-and-push:
    needs: [lint-and-validate, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Chỉ build/push khi merge/push vào develop/main
    strategy:
      fail-fast: false
      matrix:
        service: [telemetry_api, prediction_worker, ai_engine]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::511825856493:role/tf4-cdo04-github-deploy-role
          role-session-name: ecr-push-${{ matrix.service }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

       # 1. Build image locally so Trivy can scan it
      - name: Build Image locally for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          load: true
          tags: ${{ steps.login-ecr.outputs.registry }}/foresight-lens/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Run Trivy scan on the local image before pushing
      - name: Run Trivy vulnerability scanner (IaC & Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/foresight-lens/${{ matrix.service }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Build sẽ fail nếu có lỗi Critical
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      # 3. Push the already built and scanned image to ECR
      - name: Push Image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/foresight-lens/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha

  # Job 4: Terraform Plan & Apply
  terraform-deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'staging' }} # Dynamic environment (staging for develop, prod for main)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::511825856493:role/tf4-cdo04-github-deploy-role
          role-session-name: tf-deploy

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Init
        run: |
          case "${{ github.ref_name }}" in
            main) state_key="tf4-cdo04/prod/terraform.tfstate" ;;
            develop) state_key="tf4-cdo04/sandbox/terraform.tfstate" ;;
            *) state_key="tf4-cdo04/sandbox/terraform.tfstate" ;;
          esac
          terraform -chdir=infra/terraform init -backend-config="key=${state_key}"

      - name: Terraform Plan
        run: |
          terraform -chdir=infra/terraform plan \
            -var="telemetry_api_image_tag=511825856493.dkr.ecr.us-east-1.amazonaws.com/foresight-lens/telemetry_api:${{ github.sha }}" \
            -var="prediction_worker_image_tag=511825856493.dkr.ecr.us-east-1.amazonaws.com/foresight-lens/prediction_worker:${{ github.sha }}" \
            -var="ai_engine_image_tag=511825856493.dkr.ecr.us-east-1.amazonaws.com/foresight-lens/ai_engine:${{ github.sha }}"

      # Chạy Apply nếu đây là push/merge trực tiếp vào nhánh deploy
      - name: Terraform Apply
        if: github.event_name == 'push'
        run: |
          terraform -chdir=infra/terraform apply -auto-approve \
            -var="telemetry_api_image_tag=511825856493.dkr.ecr.us-east-1.amazonaws.com/foresight-lens/telemetry_api:${{ github.sha }}" \
            -var="prediction_worker_image_tag=511825856493.dkr.ecr.us-east-1.amazonaws.com/foresight-lens/prediction_worker:${{ github.sha }}" \
            -var="ai_engine_image_tag=511825856493.dkr.ecr.us-east-1.amazonaws.com/foresight-lens/ai_engine:${{ github.sha }}"

      - name: Extract Terraform Outputs
        id: tf-outputs
        if: github.event_name == 'push'
        run: |
          echo "alb_dns_name=$(terraform -chdir=infra/terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster_name=$(terraform -chdir=infra/terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "telemetry_api_service_name=$(terraform -chdir=infra/terraform output -raw telemetry_api_service_name)" >> "$GITHUB_OUTPUT"
          echo "prediction_worker_service_name=$(terraform -chdir=infra/terraform output -raw prediction_worker_service_name)" >> "$GITHUB_OUTPUT"
          echo "ai_engine_service_name=$(terraform -chdir=infra/terraform output -raw ai_engine_service_name)" >> "$GITHUB_OUTPUT"
          echo "prediction_queue_url=$(terraform -chdir=infra/terraform output -raw prediction_queue_url)" >> "$GITHUB_OUTPUT"
          echo "prediction_queue_dlq_url=$(terraform -chdir=infra/terraform output -raw prediction_queue_dlq_url)" >> "$GITHUB_OUTPUT"
          echo "amp_query_endpoint=$(terraform -chdir=infra/terraform output -raw amp_query_endpoint)" >> "$GITHUB_OUTPUT"
          echo "ai_api_gateway_endpoint=$(terraform -chdir=infra/terraform output -raw ai_api_gateway_endpoint)" >> "$GITHUB_OUTPUT"
          tenant_ingest_token_secret_arn="$(terraform -chdir=infra/terraform output -raw tenant_ingest_token_secret_arn)"
          tenant_ingest_token="$(aws secretsmanager get-secret-value --secret-id "${tenant_ingest_token_secret_arn}" --query SecretString --output text)"
          echo "::add-mask::${tenant_ingest_token}"
          echo "tenant_ingest_token=${tenant_ingest_token}" >> "$GITHUB_OUTPUT"

      # Chạy Smoke Test sau khi deploy hạ tầng thành công (CPOA-78)
      # ALB_BASE_URL dùng tên miền thực (xbrain26hackathon269.software) thay vì raw ALB DNS
      # để tránh SSL cert mismatch (ACM cert chỉ valid cho custom domain, không valid cho *.elb.amazonaws.com)
      - name: Run Post-Apply Smoke Test
        if: github.event_name == 'push'
        env:
          ALB_BASE_URL: https://xbrain26hackathon269.software
          ALB_DNS_NAME: ${{ steps.tf-outputs.outputs.alb_dns_name }}
          ECS_CLUSTER_NAME: ${{ steps.tf-outputs.outputs.ecs_cluster_name }}
          TELEMETRY_API_SERVICE_NAME: ${{ steps.tf-outputs.outputs.telemetry_api_service_name }}
          PREDICTION_WORKER_SERVICE_NAME: ${{ steps.tf-outputs.outputs.prediction_worker_service_name }}
          AI_ENGINE_SERVICE_NAME: ${{ steps.tf-outputs.outputs.ai_engine_service_name }}
          PREDICTION_QUEUE_URL: ${{ steps.tf-outputs.outputs.prediction_queue_url }}
          PREDICTION_QUEUE_DLQ_URL: ${{ steps.tf-outputs.outputs.prediction_queue_dlq_url }}
          AMP_QUERY_ENDPOINT: ${{ steps.tf-outputs.outputs.amp_query_endpoint }}
          AI_API_GATEWAY_ENDPOINT: ${{ steps.tf-outputs.outputs.ai_api_gateway_endpoint }}
          TENANT_INGEST_TOKEN: ${{ steps.tf-outputs.outputs.tenant_ingest_token }}
          AWS_REGION: us-east-1
        run: bash scripts/post_apply_smoke.sh
