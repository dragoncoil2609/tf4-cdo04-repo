# Cấu hình ADOT Collector cho CDO Telemetry API -> AMP Remote Write
# Sử dụng IAM SigV4 để ký mã hóa các request remote_write mà không cần token lâu dài (no long-lived token).

extensions:
  sigv4auth:
    region: ${AWS_REGION}
    service: aps

receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: "telemetry-api"
          scrape_interval: 15s
          metrics_path: /metrics
          static_configs:
            - targets:
                - "${TELEMETRY_API_HOST}:${TELEMETRY_API_PORT}"

exporters:
  prometheusremotewrite:
    endpoint: "${AMP_REMOTE_WRITE_ENDPOINT}"
    auth:
      authenticator: sigv4auth
    resource_to_telemetry_conversion:
      enabled: true

service:
  extensions:
    - sigv4auth
  pipelines:
    metrics:
      receivers:
        - prometheus
      exporters:
        - prometheusremotewrite
