# Reference only. Runtime ECS config is inline in infra/terraform/modules/compute/telemetry_api.tf.
receivers:
  prometheus:
    config:
      global:
        scrape_interval: 15s
        scrape_timeout: 10s
      scrape_configs:
        - job_name: telemetry-api
          metrics_path: /metrics
          static_configs:
            - targets: ["localhost:8080"]

processors:
  batch:

exporters:
  prometheusremotewrite:
    endpoint: "${AMP_REMOTE_WRITE_ENDPOINT}"
    auth:
      authenticator: sigv4auth
    sending_queue:
      enabled: true
      queue_size: 256
    retry_on_failure:
      enabled: true

extensions:
  health_check:
  sigv4auth:
    region: "${AWS_REGION}"
    service: aps

service:
  extensions: [health_check, sigv4auth]
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [batch]
      exporters: [prometheusremotewrite]
